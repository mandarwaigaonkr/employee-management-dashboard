<div class="container" *ngIf="employee">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ employee.name }}</mat-card-title>
      <mat-card-subtitle>{{ employee.role }} - {{ employee.department }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="content">
      <p><strong>Email:</strong> {{ employee.email }}</p>
      <p><strong>Salary:</strong> {{ employee.salary | currency }}</p>
      <p><strong>Date Joined:</strong> {{ employee.dateJoined | date }}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon> Back
      </button>
    </mat-card-actions>
  </mat-card>
</div>
