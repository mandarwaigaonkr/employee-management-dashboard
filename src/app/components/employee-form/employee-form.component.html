<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Edit Employee' : 'Add Employee' }}</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="form-container">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name">
          <mat-error *ngIf="employeeForm.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email">
          <mat-error *ngIf="employeeForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="employeeForm.get('email')?.hasError('email')">Invalid email format</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Department</mat-label>
          <mat-select formControlName="department">
            <mat-option *ngFor="let dept of departments" [value]="dept">
              {{ dept }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="employeeForm.get('department')?.hasError('required')">Department is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Role</mat-label>
          <input matInput formControlName="role">
          <mat-error *ngIf="employeeForm.get('role')?.hasError('required')">Role is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Salary</mat-label>
          <input matInput formControlName="salary" type="number">
          <mat-error *ngIf="employeeForm.get('salary')?.hasError('required')">Salary is required</mat-error>
          <mat-error *ngIf="employeeForm.get('salary')?.hasError('min')">Salary must be at least 1000</mat-error>
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button type="submit" [disabled]="employeeForm.invalid" color="primary">
            {{ isEditMode ? 'Update' : 'Save' }}
          </button>
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
